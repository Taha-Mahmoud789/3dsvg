name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build engine
        run: npm run build:engine

      - name: Typecheck
        run: npx tsc --noEmit -p packages/web/tsconfig.json

      - name: Lint
        run: npm run lint --workspace=packages/web

      - name: Test
        run: npm test --workspace=packages/web
